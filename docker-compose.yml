services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-ekorepetycje}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ekorepetycje}"]
      interval: 5s
      timeout: 5s
      retries: 5

  css:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app:z
    command: sh -c "npm install --silent && npx tailwindcss -i ./app/static/css/input.css -o ./app/static/css/style.css --watch"
    profiles:
      - dev

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app:z
      - ./tests:/app/tests:z
      - ./pytest.ini:/app/pytest.ini:z
      - ./scripts:/app/scripts:z
      - ./alembic:/app/alembic:z
    depends_on:
      db:
        condition: service_healthy
    # Pass --reload for live code reloading in development
    command: --reload

volumes:
  postgres_data:
