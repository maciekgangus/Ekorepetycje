services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-ekorepetycje}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ekorepetycje}"]
      interval: 5s
      timeout: 5s
      retries: 5

  css:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app:z
    command: sh -c "npm install --silent && npx tailwindcss -i ./app/static/css/input.css -o ./app/static/css/style.css --watch"
    profiles:
      - dev

  # ── Ollama — local LLM for dev (CPU-only, no GPU needed) ──────────────────
  # Start with:  docker compose --profile dev up
  # Model size:  llama3.2:3b ≈ 2 GB RAM  |  llama3.1:8b ≈ 5 GB RAM
  # First run pulls the model automatically; subsequent runs use the volume cache.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_GPU=0        # force CPU — GPU passthrough not needed
    dns:
      - 8.8.8.8
      - 1.1.1.1
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    profiles:
      - dev

  # Pulls the model once on first start; shares ollama's network namespace
  # so "localhost:11434" resolves correctly without Docker DNS.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    network_mode: "service:ollama"
    environment:
      - OLLAMA_HOST=http://localhost:11434
    entrypoint: ollama
    command: pull llama3.2:3b
    restart: "no"
    profiles:
      - dev

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app:z
      - ./tests:/app/tests:z
      - ./pytest.ini:/app/pytest.ini:z
      - ./scripts:/app/scripts:z
      - ./alembic:/app/alembic:z
    depends_on:
      db:
        condition: service_healthy
    # Pass --reload for live code reloading in development
    command: --reload

volumes:
  postgres_data:
  ollama_data:
